<!doctype html>
<html lang="sl" data-theme="glossy">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Set the saved theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem('deli:theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'glossy');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'glossy');
      }
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0C1017" />
    <meta name="description" content="Deli — skeniraj račun, dodeli, kdo je kaj imel, in aplikacija izračuna kdo komu koliko dolguje." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Deli — deljenje računov</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
